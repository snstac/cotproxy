name: CI

on:
  push:
    branches: ['**']
    tags: ['*']
  pull_request:

jobs:

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          pip install .
      - name: Test with pytest
        run: pytest tests/

  package-deb:
    name: Build Debian Package
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    env:
      DEB_BUILD_OPTIONS: nocheck
    steps:
      - uses: actions/checkout@v4
      - name: Install Debian build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential debhelper dh-python python3-all python3-stdeb python3-setuptools
      - name: Build Debian package
        run: |
          python3 setup.py --command-packages=stdeb.command sdist_dsc bdist_deb
          ls -la deb_dist/*.deb
      - uses: actions/upload-artifact@v4
        with:
          name: artifact-deb
          path: deb_dist/*.deb

  release:
    name: Create GitHub Release
    needs: [package-deb]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: artifact-deb
          path: dist/
      - name: Create release and upload packages
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
